<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEO Framework 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Custom Palette Mapping
              blue: {
                50: '#F0F7FF',
                100: '#E0EFFF',
                200: '#B3D9FF',
                300: '#8AC6FF', // Azul Claro (User provided)
                400: '#4D9EFF',
                500: '#2B87D1',
                600: '#0055A4', // Azul Primário (User provided)
                700: '#004483',
                800: '#003366', // Azul Escuro (User provided)
                900: '#002244',
                950: '#001122',
              },
              slate: {
                50: '#F8FAFC',
                100: '#F1F5F9',
                200: '#E2E8F0',
                300: '#D1D1D1',
                400: '#B0B0B0', // Cinza Médio (User provided)
                500: '#94A3B8',
                600: '#475569',
                700: '#333333', // Cinza Escuro (User provided - mapped to text-slate-700/800 usage)
                800: '#333333', // Mapping to Dark Gray
                900: '#000000', // Preto (User provided)
                950: '#000000',
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
      /* Custom scrollbar for clean UI */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #B0B0B0; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #333333; }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
